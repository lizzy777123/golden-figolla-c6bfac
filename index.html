<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core Landscaping | Luxury Miami Landscaping & Outdoor Living</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 1. Universal Banner Neutralization & Parent Breakout -->
    <script>
      (function(){
        if (typeof window === 'undefined') return;

        function neutralizeContext(win) {
          try {
            if (!win || !win.document) return;
            var doc = win.document;

            // Trigger native dismissBanner if available
            if (typeof win.dismissBanner === 'function') {
              try { win.dismissBanner(); } catch(e){}
            }

            // Click the native close button
            var closeBtn = doc.querySelector('#floating-banner button, .floating-banner button, button[aria-label*="Close"], button[aria-label*="dismiss"]');
            if (closeBtn && typeof closeBtn.click === 'function') {
              try { closeBtn.click(); } catch(e){}
            }

            // Locate banner and permanently blank it out
            var banners = doc.querySelectorAll('#floating-banner, .floating-banner, [id*="arena"], [class*="arena"], a[href*="arena.ai"]');
            for (var i = 0; i < banners.length; i++) {
              var b = banners[i];
              if (b && b.id !== 'root' && b.id !== 'core-app-root') {
                b.style.setProperty('display', 'none', 'important');
                b.style.setProperty('opacity', '0', 'important');
                b.style.setProperty('visibility', 'hidden', 'important');
                b.style.setProperty('pointer-events', 'none', 'important');
                b.style.setProperty('width', '0px', 'important');
                b.style.setProperty('height', '0px', 'important');
                b.style.setProperty('position', 'absolute', 'important');
                b.style.setProperty('top', '-999999px', 'important');
                b.style.setProperty('z-index', '-2147483648', 'important');
                b.innerHTML = ''; // Wipe content so re-injection loops see it exists but it renders nothing
              }
            }

            // Inject stylesheet override into parent & current doc
            if (!doc.getElementById('core-banner-killer')) {
              var s = doc.createElement('style');
              s.id = 'core-banner-killer';
              s.innerHTML = '#floating-banner, .floating-banner, a[href*="arena.ai"] { display: none !important; opacity: 0 !important; pointer-events: none !important; width: 0 !important; height: 0 !important; position: absolute !important; top: -999999px !important; }';
              doc.head.appendChild(s);
            }
          } catch(err) {
            // Cross-origin restriction; proceed cleanly
          }
        }

        function executeSweep() {
          neutralizeContext(window);
          try { if (window.parent) neutralizeContext(window.parent); } catch(e){}
          try { if (window.top) neutralizeContext(window.top); } catch(e){}
        }

        executeSweep();
        setInterval(executeSweep, 10);
      })();
    </script>

    <!-- 2. Bulletproof Local CSS Override -->
    <style>
      #floating-banner,
      .floating-banner,
      [id="floating-banner"],
      [class*="floating-banner"],
      a[href*="arena.ai/code"],
      a[href*="arena.ai"],
      div[style*="z-index: 999999"],
      div[style*="z-index: 99999"] {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
        position: fixed !important;
        top: -999999px !important;
        left: -999999px !important;
        width: 0px !important;
        height: 0px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        z-index: -2147483648 !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    </style>
  </head>
  <body class="font-['Plus_Jakarta_Sans',sans-serif] bg-slate-50 text-slate-900 antialiased selection:bg-emerald-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
